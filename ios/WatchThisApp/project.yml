name: WatchThisApp
options:
  bundleIdPrefix: com.watchthis
  deploymentTarget:
    iOS: '17.0'
settings:
  base:
    SWIFT_VERSION: 6.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: WatchThis
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    CODE_SIGN_STYLE: Automatic
configs:
  Debug: debug
  Release: release
targets:
  WatchThisApp:
    type: application
    platform: iOS
    deploymentTarget: '17.0'
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    sources:
      - path: WatchThisApp
    resources:
      - path: Fixtures
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.watchthis.app
        INFOPLIST_KEY_APP_MODE: $(APP_MODE)
        INFOPLIST_KEY_API_BASE_URL: $(API_BASE_URL)
    scheme:
      gatherCoverageData: true
      testTargets:
        - WatchThisAppTests
        - WatchThisAppUITests

  WatchThisAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - path: WatchThisAppTests
    dependencies:
      - target: WatchThisApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.watchthis.app.tests

  WatchThisAppUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - path: WatchThisAppUITests
    dependencies:
      - target: WatchThisApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.watchthis.app.uitests
        TEST_TARGET_NAME: WatchThisApp
